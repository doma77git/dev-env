# === .github/workflows/validate-agents.yml =====================
# ROLE:   Validate AGENTS.md phase list matches actual scripts/
#         Ověří, že dokumentace není v rozporu s realitou
# ==============================================================
name: Validate AGENTS.md

on:
  push:
    branches: [master, main]
    paths: ['AGENTS.md', 'scripts/*.ps1']
  pull_request:
    branches: [master, main]

jobs:
  validate:
    name: Check phase sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -AllowClobber
          }
          Import-Module PSScriptAnalyzer

      - name: Lint PowerShell scripts
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path scripts/ -Severity @('Error','Warning') -Recurse -ExcludeRule @('PSAvoidUsingWriteHost', 'PSShouldProcess', 'PSUseDeclaredVarsMoreThanAssignments')
          $results | Format-Table -AutoSize | Out-String | Write-Host
          $errors = $results | Where-Object Severity -eq 'Error'
          if ($errors) { Write-Host "::warning::PSScriptAnalyzer found $($errors.Count) error(s)"; exit 1 }
          Write-Host "✅ PSScriptAnalyzer passed" -ForegroundColor Green
        continue-on-error: true  # Non-blocking advisory

      - name: Extract phase scripts from AGENTS.md
        shell: pwsh
        run: |
          $content = Get-Content AGENTS.md -Raw
          # Find phase table in AGENTS.md
          $table = $content | Select-String -Pattern '(?<=\| Phase \| Script \| Purpose \|).*?(?=\n\n)' -AllMatches
          $mdPhases = @()
          if ($table.Matches) {
            foreach ($m in $table.Matches) {
              $lines = $m.Value -split "`n"
              foreach ($line in $lines) {
                if ($line -match '\| (\d+)-(\d+) \| scripts/([\w.-]+\.ps1)') {
                  $mdPhases += @{ num = "$1-$2"; script = $3 }
                }
              }
            }
          }
          $mdPhases | ConvertTo-Json | Write-Host

      - name: List actual scripts
        shell: pwsh
        run: |
          $actual = Get-ChildItem scripts/*.ps1 | Where-Object { $_.Name -match '^\d\d-' }
          $actual | ForEach-Object { Write-Host $_.Name }

      - name: Validate script headers
        shell: pwsh
        run: |
          $failed = $false
          foreach ($script in Get-ChildItem scripts/*.ps1) {
            $header = Get-Content $script.FullName -First 10 -Raw
            if ($header -notmatch 'ROLE:|RUN:|INPUT:|OUTPUT:') {
              Write-Host "::warning::❌ $($script.Name) missing header pattern (ROLE:/RUN:/INPUT:/OUTPUT:)"
              $failed = $true
            }
          }
          if ($failed) { Write-Host "Some scripts missing header pattern"; exit 1 }
          Write-Host "✅ All script headers valid" -ForegroundColor Green

      - name: Compare
        shell: pwsh
        run: |
          $errors = @()
          $content = Get-Content AGENTS.md -Raw
          $table = $content | Select-String -Pattern '(?<=\| Phase \| Script \| Purpose \|).*?(?=\n\n)' -AllMatches
          if (-not $table.Matches) { Write-Host "No phase table found in AGENTS.md"; exit 1 }
          
          $mdScripts = @()
          foreach ($m in $table.Matches) {
            $lines = $m.Value -split "`n"
            foreach ($line in $lines) {
              if ($line -match '\|.*\|.*scripts/([\w.-]+\.ps1)\|') { $mdScripts += $matches[1] }
            }
          }
          
          $actualScripts = Get-ChildItem scripts/*.ps1 | Where-Object { $_.Name -match '^\d\d-' } | ForEach-Object { $_.Name }
          
          # Check scripts in MD but not on disk
          foreach ($s in $mdScripts) {
            if ($s -notin $actualScripts) { $errors += "AGENTS.md mentions '$s' but file not found in scripts/" }
          }
          # Check scripts on disk but not in MD
          foreach ($s in $actualScripts) {
            if ($s -notin $mdScripts) { $errors += "Script '$s' exists but is not listed in AGENTS.md phase table" }
          }
          
          if ($errors.Count -gt 0) {
            foreach ($e in $errors) { Write-Host "::warning::$e" }
            exit 1
          }
          Write-Host "✅ AGENTS.md phase list matches scripts/ directory" -ForegroundColor Green
